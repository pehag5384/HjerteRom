<!-- Viser anbefalte omsorgssentre basert på state -->

<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carecenter – HjerteRom</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">

</head>
<body>
  <main class="iphone">

      <header class="header" id="header"></header>

      <!-- HERO -->
      <section class="activity-hero">
        <div class="hero-overlay">
          <h1 id="centerName"></h1>
          <div>
            <p>Nærmeste sykehus: <span id="nearestHospital"></span></p>
            <p>Adresse: <span id="centerAddress"></span></p>
          </div>
        </div>
      </section>

      <!-- AVSTAND OG REISETID -->
      <section>
        <div id="routeMap"></div>
        <div class="info-box">
          <p id="distanceToCenter"></p>
          <p id="travelTime"></p>
        </div>
      </section>

      <!-- SCORES -->
      <section>
        <div class="info-box">
          <p id="overallScore"></p>
          <span>Helhetlig vurdering</span>
        </div>
        <div class="info-box">
          <p id="facilityScore"></p>
          <span>Fasiliteter</span>
        </div>
        <div class="info-box">
          <p id="satisfactionScore"></p>
          <span>Tilfredshet</span>
        </div>
      </section>

      <!-- OM SENTERET -->
      <section>
        <h2>Om senteret</h2>
        <p id="centerDescription"></p>
      </section>

      <!-- TJENESTER -->
      <section>
        <h2>Våre tjenester</h2>
        <ul id="serviceList"></ul>
      </section>

      <!-- ÅPNINGSTIDER -->
      <section class="filter-panel">
        <h2>Åpningstider</h2>
        <div id="openingHours"></div>
      </section>

      <!-- PRAKTISK INFO -->
      <section>
        <h2>Praktisk informasjon</h2>
        <div class="info-box" id="practicalInfoList"></div>
      </section>

      <!-- KONTAKT -->
      <section>
        <button class="btn-primary-custom" id="contactCenterBtn">
          Kontakt senteret
        </button>
      </section>

      <!-- FASILITETER -->
      <section>
        <h2>Fasiliteter</h2>
        <div id="facilityList"></div>
      </section>

      <!-- ANMELDELSER -->
      <section>
        <h2>Anmeldelser</h2>
        <div id="reviewList"></div>
      </section>

      <!-- HANDLINGER -->
      <section>
        <button class="btn-secondary-custom" id="compareBtn">
          Sammenlign
        </button>
        <button class="btn-primary-custom" id="backToMapBtn">
          Tilbake til kart
        </button>
      </section>

      <footer class="footer" id="footer"></footer>

    </main>
    <script type="module" src="../js/app.js"></script>
  </body>
</html>
