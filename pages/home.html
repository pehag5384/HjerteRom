<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>home - HjerteRom</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <link rel="stylesheet" href="\../css/main.css">
  <link rel="stylesheet" href="\../css/components.css">

</head>
<body>
  <main class="iphone">

    <header class="header" id="header">

      <div class="logo-area"></div>

    </header>
    
    <section class="hero">

      <div class="hero-overlay">

        <p id="homegreeting"></p>
        
        <h1> 
          Området som <br>
          passer deg, <br>
        
          <span id="currentArea"></span>
        </h1>

      </div>

    </section>

    <section class="search-section">
      <input id="areaSearch" type="text" placeholder="Søk etter område">
    </section>

    <section class="shortcut-grid" id="shortcutGrid"></section>

    <section class="popular-section">
      <h2>Populære omsorgssentere</h2>

      <div class="popular-list" id="popularCenters"></div>

      <button class="see-more-btn"> Se mer </button>
    </section>

    <footer class="footer" id="footer"></footer>

  </main>

  <script type="module" src="../js/app.js"></script>
</body>
</html>
